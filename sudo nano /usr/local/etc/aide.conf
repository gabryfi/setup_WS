sudo nano /usr/local/etc/aide.conf

##################################
# Database
database_in=file:/usr/local/var/lib/aide/aide.db.gz
database_out=file:/usr/local/var/lib/aide/aide.db.new.gz
gzip_dbout=yes

# Report
report_url=file:/usr/local/var/log/aide/aide-report.txt

# ======================
# GRUPPI
# ======================

# Massima integrità (GLP critical)
CRITICAL = p+i+n+u+g+s+m+c+sha256

# Binari (hash + attributi)
BIN = p+i+n+u+g+s+m+c+sha256

# Log (no hash → troppo variabili)
LOG = p+n+u+g

# ======================
# ESCLUSIONI OBBLIGATORIE
# ======================

-/proc$ d
-/sys$ d
-/dev$ d
-/run$ d

# Evita rumore inutile
-/tmp$ d
-/var/tmp$ d

# AIDE stesso (fondamentale)
-/usr/local/var/lib/aide$ d
-/usr/local/var/log/aide$ d

# Cache utente / browser
!/home/*/.cache
!/home/*/.mozilla
!/home/*/snap

# ======================
# MONITORAGGIO CRITICO (GLP)
# ======================

/etc                CRITICAL

/bin                BIN
/sbin               BIN
/usr/bin            BIN
/usr/sbin           BIN
/usr/local/bin      BIN
/usr/local/sbin     BIN

# ======================
# LOG (monitorati ma senza hash)
# ======================

/var/log            LOG

# ======================
# HOME (solo struttura, no rumore)
# ======================

/home               p+i+n+u+g
###################################

# ESEGUIRE IL CHECK
sudo aide --config=/usr/local/etc/aide.conf --check

# SE UN CAMBIAMENTO E' VOLUTO, ALLORA:
sudo aide --config=/usr/local/etc/aide.conf --init
sudo mv /usr/local/var/lib/aide/aide.db.new.gz /usr/local/var/lib/aide/aide.db.gz
